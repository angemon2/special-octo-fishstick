<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="CSSforCounter.css" type="text/css">
  <script src="JSforcounter.js"></script>
</head>
<body>
  <div class="container">
    <div class="counter">
      <p id="count">0</p>
    </div>
    <div>
      <button onclick="dec()">Decrement</button>
      <button onclick="inc()">Increment</button>
    </div>
    <div class="clicks">
      <p>Clicks On Increment: <span id="incCount">0</span> </p>
      <p>Clicks on Decrement: <span id="decCount">0</span></p>
    </div>
  </div>
</body>
</html>
